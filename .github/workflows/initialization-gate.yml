name: Initialization Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gradle-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - name: Set up Node 26
        uses: actions/setup-node@v7
        with:
          node-version: '26.5.0'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Start Android emulator and run Gradle gate
        uses: reactivecircus/android-emulator-runner@v3
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          script: scripts/check-gradle

  angular-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Set up Node 26
        uses: actions/setup-node@v7
        with:
          node-version: '26.5.0'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm --prefix frontend ci
      - name: Lint
        run: npm --prefix frontend run lint
      - name: Test
        run: npm --prefix frontend run test:ci
      - name: Build
        run: npm --prefix frontend run build

  ios-gate:
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - name: Run iOS gate
        run: scripts/check-ios

  landing-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Run landing gate
        run: scripts/check-landing

  initialization-gate:
    runs-on: ubuntu-latest
    needs: [gradle-gate, angular-gate, ios-gate, landing-gate]
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Evaluate gate results
        run: scripts/evaluate-ci-gates "$GRADLE_RESULT" "$ANGULAR_RESULT" "$IOS_RESULT" "$LANDING_RESULT"
        env:
          GRADLE_RESULT: ${{ needs.gradle-gate.result }}
          ANGULAR_RESULT: ${{ needs.angular-gate.result }}
          IOS_RESULT: ${{ needs.ios-gate.result }}
          LANDING_RESULT: ${{ needs.landing-gate.result }}
