name: Initialization Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gradle-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - name: Enable KVM for Android emulator
        run: |
          sudo sh -c 'echo KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm" > /etc/udev/rules.d/99-kvm4all.rules'
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Start Android emulator and run Gradle gate
        uses: ReactiveCircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_6
          avd-name: saqz-ci
          emulator-build: 13823996
          emulator-boot-timeout: 300
          pre-emulator-launch-script: adb start-server
          disable-animations: true
          script: scripts/check-gradle

  angular-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Set up Node 26
        uses: actions/setup-node@v7
        with:
          node-version: '26.5.0'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm --prefix frontend ci
      - name: Lint
        run: npm --prefix frontend run lint
      - name: Test
        run: npm --prefix frontend run test:ci
      - name: Build
        run: npm --prefix frontend run build

  ios-gate:
    runs-on: macos-26
    timeout-minutes: 45
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.4.app/Contents/Developer
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - name: Run iOS gate
        run: scripts/check-ios

  landing-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Run landing gate
        run: scripts/check-landing

  initialization-gate:
    runs-on: ubuntu-latest
    needs: [gradle-gate, angular-gate, ios-gate, landing-gate]
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Evaluate gate results
        run: scripts/evaluate-ci-gates "$GRADLE_RESULT" "$ANGULAR_RESULT" "$IOS_RESULT" "$LANDING_RESULT"
        env:
          GRADLE_RESULT: ${{ needs.gradle-gate.result }}
          ANGULAR_RESULT: ${{ needs.angular-gate.result }}
          IOS_RESULT: ${{ needs.ios-gate.result }}
          LANDING_RESULT: ${{ needs.landing-gate.result }}
