name: saqz

services:
  backend:
    image: saqz-backend:dev
    build:
      context: ./backend
    ports:
      - "${SAQZ_BACKEND_PORT:-8080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SAQZ_FIREBASE_PROJECT_ID: saqz-dev
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/firebase-admin
    secrets:
      - firebase-admin
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/actuator/health"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    init: true
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

secrets:
  firebase-admin:
    file: ./.secrets/firebase-dev-service-account.json
